name: Build

on:
  workflow_dispatch:
    inputs:
      unity_version:
        description: Unity version to install (e.g. 6000.2.7f2)
        required: true
        default: 6000.2.7f2
      unity_changeset:
        description: Changeset ID matching the Unity version (from the Unity download archive)
        required: true
        default: 2b518236b676
      config:
        description: BuildConfig asset name (Dev, DevLocal, or Production)
        required: true
        default: Dev
      target:
        description: Build target (Windows64 or OSX)
        required: true
        default: Windows64

jobs:
  build:
    # to cross-compile for Windows and Mac; uses arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Unity installation
        id: cache-unity
        uses: actions/cache@v4
        with:
          path: /Applications/Unity/Hub/Editor/${{ github.event.inputs.unity_version }}
          key: unity-${{ github.event.inputs.unity_version }}

      - name: Install Unity
        if: steps.cache-unity.outputs.cache-hit != 'true'
        run: |
          brew install --cask unity-hub
          /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- \
            --headless install \
            --version ${{ github.event.inputs.unity_version }} \
            --changeset ${{ github.event.inputs.unity_changeset }} \
            --architecture arm64

      - name: Import certificate into keychain
        env:
          MACOS_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          MACOS_CI_KEYCHAIN_RANDOM_PWD: ${{ secrets.MACOS_CI_KEYCHAIN_RANDOM_PWD }}
        run: |
          echo $MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_CI_KEYCHAIN_RANDOM_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_CI_KEYCHAIN_RANDOM_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CI_KEYCHAIN_RANDOM_PWD" build.keychain

      - name: Build (Unity)
        run: |
          $UNITY_PATH -batchmode -quit \
            -projectPath . \
            -executeMethod Resonance.BuildTools.BuildScript.BuildCLI \
            -buildConfig ${{ github.event.inputs.config || 'Dev' }} \
            -buildTarget ${{ github.event.inputs.target || 'Windows64' }} \
        env:
          UNITY_PATH: /Applications/Unity/Hub/Editor/${{ github.event.inputs.unity_version }}/Unity.app/Contents/MacOS/Unity
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Zip
        run: |
          CONFIG=${{ github.event.inputs.config || 'Dev' }}
          if [ "${{ github.event.inputs.target || 'Windows64' }}" = "OSX" ]; then
            ditto -c -k --keepParent "Builds/$CONFIG/Mac/Resonance.app" "Resonance_mac.zip"
            echo "ARTIFACT=Resonance_mac.zip" >> $GITHUB_ENV
          else
            cd "Builds/$CONFIG/Windows" && zip -r "../../../Resonance_win.zip" .
            echo "ARTIFACT=Resonance_win.zip" >> $GITHUB_ENV
          fi

      - name: Upload to GitHub Releases
        run: |
          TAG="build-$(date +%Y%m%d-%H%M%S)"
          gh release create "$TAG" "$ARTIFACT" \
            --title "Build $TAG (${{ github.event.inputs.config || 'Dev' }} / ${{ github.event.inputs.target || 'Windows64' }})" \
            --notes "Automated build via GitHub Actions"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
